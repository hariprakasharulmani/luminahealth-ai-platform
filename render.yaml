services:
  # Spring Boot Backend Service
  - type: web
    name: health-monitoring-backend
    env: docker
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/health-monitoring-backend-0.0.1-SNAPSHOT.jar
    region: oregon 
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Set securely in Render dashboard
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: health-ml-service
          property: host
          
  # FastAPI ML Service
  - type: web
    name: health-ml-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    region: oregon
